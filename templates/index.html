<!DOCTYPE html>
<html>
<head>
    <title>Bank Marketing Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        h2 {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
            margin-top: 25px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.3);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 30px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        small {
            color: #999;
            font-size: 12px;
        }
        .note {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Bank Term Deposit Predictor</h1>
        
        <form method="POST" action="/predict">
            <h2>📋 Personal Information</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Age:</label>
                    <input type="number" name="age" value="35" min="18" max="100" required>
                </div>
                
                <div class="form-group">
                    <label>Job:</label>
                    <select name="job">
                        <option value="admin.">Admin.</option>
                        <option value="blue-collar">Blue Collar</option>
                        <option value="management" selected>Management</option>
                        <option value="technician">Technician</option>
                        <option value="services">Services</option>
                        <option value="retired">Retired</option>
                        <option value="student">Student</option>
                        <option value="unemployed">Unemployed</option>
                        <option value="entrepreneur">Entrepreneur</option>
                        <option value="housemaid">Housemaid</option>
                        <option value="self-employed">Self-employed</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Marital Status:</label>
                    <select name="marital">
                        <option value="married" selected>Married</option>
                        <option value="single">Single</option>
                        <option value="divorced">Divorced</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Education:</label>
                    <select name="education">
                        <option value="primary">Primary</option>
                        <option value="secondary" selected>Secondary</option>
                        <option value="tertiary">Tertiary</option>
                        <option value="unknown">Unknown</option>
                    </select>
                </div>
            </div>
            
            <h2>💰 Financial Information</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Balance (€):</label>
                    <input type="number" name="balance" value="2500" step="0.01" required>
                </div>
                
                <div class="form-group">
                    <label>Default:</label>
                    <select name="default">
                        <option value="no" selected>No</option>
                        <option value="yes">Yes</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Housing Loan:</label>
                    <select name="housing">
                        <option value="no" selected>No</option>
                        <option value="yes">Yes</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Personal Loan:</label>
                    <select name="loan">
                        <option value="no" selected>No</option>
                        <option value="yes">Yes</option>
                    </select>
                </div>
            </div>
            
            <h2>📞 Campaign Information</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Contact Day:</label>
                    <input type="number" name="day" value="15" min="1" max="31" required>
                </div>
                
                <div class="form-group">
                    <label>Contact Month:</label>
                    <select name="month">
                        <option value="jan">January</option>
                        <option value="feb">February</option>
                        <option value="mar">March</option>
                        <option value="apr">April</option>
                        <option value="may" selected>May</option>
                        <option value="jun">June</option>
                        <option value="jul">July</option>
                        <option value="aug">August</option>
                        <option value="sep">September</option>
                        <option value="oct">October</option>
                        <option value="nov">November</option>
                        <option value="dec">December</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Campaign Contacts:</label>
                    <input type="number" name="campaign" value="1" min="1" max="50" required>
                </div>
                
                <div class="form-group">
                    <label>Days Since Last Contact:</label>
                    <input type="number" name="pdays" value="-1" required>
                    <small>(-1 = never contacted)</small>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Previous Contacts:</label>
                    <input type="number" name="previous" value="0" min="0" required>
                </div>
                
                <div class="form-group">
                    <label>Previous Outcome:</label>
                    <select name="poutcome">
                        <option value="unknown" selected>Unknown</option>
                        <option value="success">Success</option>
                        <option value="failure">Failure</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            
            <button type="submit">🔮 Predict Subscription</button>
        </form>
        
        <div class="note">
            ⚡ Model: Random Forest | Accuracy: ~89% | F1-Score: 0.44
        </div>
    </div>
</body>
</html>
